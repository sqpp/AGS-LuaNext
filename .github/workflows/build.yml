name: Build AgsLuaNext (x86)

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Build LuaJIT (x86)
      shell: cmd
      working-directory: third_party/luajit/src
      run: |
        call msvcbuild.bat

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build AgsLuaNext (x86)
      run: |
        msbuild AgsLuaNext.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

    - name: Create release package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path dist -Force | Out-Null
        Compress-Archive -Path Release/AgsLuaNext.dll, third_party/luajit/src/lua51.dll, AgsLua.ash, README.md, CHANGELOG.md, VERSION -DestinationPath dist/AgsLuaNext-x86.zip -Force

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AgsLuaNext-x86
        path: |
          Release/AgsLuaNext.dll
          third_party/luajit/src/lua51.dll
          dist/AgsLuaNext-x86.zip
          AgsLua.ash
          README.md
          CHANGELOG.md
          VERSION

    - name: Publish release assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/AgsLuaNext-x86.zip
          Release/AgsLuaNext.dll
          third_party/luajit/src/lua51.dll
          AgsLua.ash
        generate_release_notes: true
