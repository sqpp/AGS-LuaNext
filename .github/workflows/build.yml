name: Build AgsLuaNext (x86)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC (x86)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Build LuaJIT (x86)
      shell: cmd
      working-directory: third_party/luajit/src
      run: |
        call msvcbuild.bat

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build AgsLuaNext (x86)
      run: |
        msbuild AgsLuaNext.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AgsLuaNext-x86
        path: |
          Release/AgsLuaNext.dll
          third_party/luajit/src/lua51.dll
